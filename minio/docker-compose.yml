services:
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_storage:/data
    environment:
      MINIO_ROOT_USER: book # Replace with your desired username
      MINIO_ROOT_PASSWORD: password123 # Replace with your desired password
    command: server --console-address ":9001" /data
    networks:
      - shared-net
volumes:
  minio_storage: {}

networks:
  shared-net:
    external: true
