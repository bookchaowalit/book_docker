services:
  postgres:
    image: postgres
    container_name: postgres_container
    restart: on-failure
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - local_pgdata:/var/lib/postgresql/data
    networks:
      - shared-net

volumes:
  local_pgdata:


networks:
  shared-net:
    external: true
